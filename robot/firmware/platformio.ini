; PlatformIO Project Configuration File
;
;   Hai firmware trong cùng project:
;     env:car    → src/main.cpp    (ESP32-S3 trên xe: i-BUS hub + ESP-NOW)
;     env:dongle → src/dongle.cpp  (ESP32-S3 cắm USB: cầu ESP-NOW ↔ serial)
;   build_src_filter đảm bảo mỗi env CHỈ compile đúng 1 file (tránh trùng setup/loop).
;
;   Flash chỉ định cổng:
;     pio run -e car    -t upload --upload-port /dev/ttyACM1
;     pio run -e dongle -t upload --upload-port /dev/ttyACM0
;
; https://docs.platformio.org/page/projectconf.html

; ── Cấu hình chung cho mọi env (board N16R8) ──────────────────────
[env]
; Trỏ trực tiếp sang fork cộng đồng để kích hoạt Arduino Core 3.x chính chủ
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; Cấu hình chuẩn xác cho dòng chip N16R8 của bạn
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_build.psram_type = opi
build_flags =
    -D BOARD_HAS_PSRAM

upload_speed = 921600
monitor_speed = 115200

; ── Firmware xe ───────────────────────────────────────────────────
[env:car]
build_src_filter = +<main.cpp>
; Đưa `Serial` (telemetry/control) ra CỔNG USB NATIVE của ESP32-S3
; ("USB JTAG/serial debug unit") thay vì UART0→CH343 ("USB Single Serial").
; LÝ DO: cổng CH343 thiếu trở CC nên điện thoại (host USB-C) KHÔNG cấp nguồn qua
; cáp C-to-C trực tiếp (đèn tắt); cổng native có CC chuẩn → phone cấp nguồn + nhận
; ngay → cắm THẲNG phone↔xe, bỏ hub/dongle, hết back-feed. Nạp code vẫn qua cổng
; CH343 (UART0 download). App đã whitelist VID 0x303A + fallback CdcAcm.
build_flags =
    ${env.build_flags}
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; ── Firmware dongle (cầu nối USB) ─────────────────────────────────
[env:dongle]
build_src_filter = +<dongle.cpp>

; ── Calibrate servo (JOG) ─────────────────────────────────────────
; Tool dò biên L/R + tâm cho servo mới. KHÔNG có cờ USB_CDC → Serial ra
; UART0/CH343, monitor dễ. Flash + monitor qua cùng cổng CH343.
[env:servocal]
build_src_filter = +<servo_calibrate.cpp>
