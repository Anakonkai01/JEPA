# VJEPA2ACCar training on TowerPro patch latents (docs/VJEPA2_AC_CAR.md).
#   1) python scripts/encode_patch.py --raw-dir data/raw_towerpro --out-dir data/latents_towerpro_patch
#   2) python scripts/train_ac_car.py --config configs/train/vjepa_ac_car.yaml configs/model/vjepa_ac_car.yaml
device: cuda
seed: 0

wandb:
  enabled: True
  project: lewm-rccar
  group: vjepa_ac_car

data:
  patch_dir: data/latents_towerpro_patch
  raw_dir: data/raw_towerpro
  val_frac: 0.2
  horizon: 4
  frame_stride: 2                 # ~220ms/step at 9fps (≈ V-JEPA 2-AC 4fps)
  state_columns: [speed, gx, gy, gz, ax, ay, az, rx, ry, rz]  # full IMU + GPS speed (ablate vs [speed, gz])
  action_scale: [1.0, 6.67]       # throttle ~[-0.15,0.15] -> ~[-1,1]

train:
  epochs: 60
  batch_size: 40
  lr: 2.5e-4            # linear-scale with batch: 2e-4 * (40/32) = 2.5e-4
  weight_decay: 1.0e-4
  warmup_frac: 0.05
  num_workers: 6
  patience: 12
  min_delta: 1.0e-4
  out_dir: checkpoints/vjepa_ac_car

eval:
  horizon: 3
