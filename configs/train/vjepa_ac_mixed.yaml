# vjepa_ac on MIXED (KDS + TowerPro). The LeWM evidence is decisive: a mixed model
# scores rollout@1 0.65 on TowerPro-only held-out, vs 1.07 for a TowerPro-only model
# — cross-servo-domain training transfers (KDS is steering-rich). We expect the same
# for vjepa_ac. Uses merged symlink dirs (unique session timestamps -> no collision):
#   data/latents_mixed/  = data/latents/*.pt  +  data/latents_towerpro/*.pt
#   data/raw_mixed/       = data/raw/session_* +  data/raw_towerpro/session_*
#   python scripts/train.py --config configs/train/vjepa_ac_mixed.yaml configs/model/vjepa_ac.yaml
device: cuda
seed: 0

wandb:
  enabled: false
  project: rc-car-jepa
  entity: null
  group: vjepa_ac_mixed

data:
  raw_dir: data/raw_mixed
  latents_dir: data/latents_mixed
  val_frac: 0.2
  action_scale: [1.0, 6.67]    # normalize throttle to ~[-1,1] like steering

train:
  epochs: 120
  batch_size: 512
  lr: 3.0e-4
  weight_decay: 1.0e-4
  warmup_frac: 0.05
  cos_weight: 0.5
  num_workers: 6
  patience: 15
  min_delta: 1.0e-4
  out_dir: checkpoints/vjepa_ac_mixed

eval:
  horizon: 10
