# Training defaults. Merge with a model config:
#   python scripts/train.py --config configs/train/default.yaml configs/model/vjepa_ac.yaml
device: cuda

train:
  epochs: 80
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 1.0e-4
  cos_weight: 0.5          # weight of (1 - cosine_sim) term in ac_loss
  num_workers: 4
  out_dir: checkpoints     # checkpoints/<model.name>/ written here
  log_dir: runs            # TensorBoard

# data.* defaults come from configs/data/default.yaml — include it too if needed,
# or rely on these inline minimums:
data:
  raw_dir: data/raw_kds          # KDS-servo sessions (renamed from data/raw 2026-06-09)
  latents_dir: data/latents_kds
  use_imu: false
