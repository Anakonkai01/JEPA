# COOLDOWN #2 từ cd4-best: auto_steps 2→3 (deepen ROLLOUT — đúng nhánh CEM dùng, horizon 4).
# Căn cứ (06-12 đêm): probe_energy contrast TỤT theo khoảng cách target (d2 0.443 → d8 0.270)
# = rollout nhiều bước mờ dần; train hiện chỉ TF + 2-step. auto_steps 3 train thẳng nhánh đó.
# Thay đổi DUY NHẤT = auto_steps (+ LR decay nhỏ tiếp) -> ablation sạch, so theo luật B5:
# giữ cd4_as3 CHỈ KHI eval_ratio @2/@3 + goal-reaching d=4/8 cải thiện mà d=1 không xấu đi.
# ⚠️ val loss KHÔNG so trực tiếp với cd4 được (objective đổi: TF+3-step thay TF+2-step).
#   PYTORCH_ALLOC_CONF=expandable_segments:True PYTHONPATH=src python scripts/train_ac_car.py \
#     --config configs/train/vjepa_ac_car_cd4_as3.yaml configs/model/vjepa_ac_car.yaml
device: cuda
seed: 0

wandb:
  enabled: True
  project: rc-car-jepa
  group: vjepa_ac_car_cd4_as3

data:
  roots:
    - {patch_dir: data/latents_towerpro_patch_384, raw_dir: data/raw_towerpro, domain_id: 1}
    - {patch_dir: data/latents_kds_patch_384,      raw_dir: data/raw_kds,      domain_id: 0}
  val_frac: 0.2
  horizon: 4
  frame_stride: 2
  max_gap: 2
  state_columns: [speed, gx, gy, gz, ax, ay, az, rx, ry, rz, prev_steer, prev_throttle]
  action_scale: [1.0, 6.67]

train:
  epochs: 2
  batch_size: 64
  gradient_checkpointing: true
  lr: 8.0e-5                      # cooldown từ ckpt đã cooldown (cd4 kết ở ~0) — đỉnh thấp
  weight_decay: 1.0e-4
  warmup_frac: 0.01
  num_workers: 4
  patience: 2
  min_delta: 1.0e-4
  compile: false                  # 4 seq-length (TF + rollout 1/2/3) -> compile storm, chạy eager
  auto_steps: 3
  init_from: checkpoints/vjepa_ac_car_cd4/vjepa_ac_car/best.pt
  resume: auto
  save_steps: 600
  out_dir: checkpoints/vjepa_ac_car_cd4_as3

eval:
  horizon: 3
