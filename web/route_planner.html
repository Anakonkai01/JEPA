<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>RC Route Planner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --bg:#11151a; --panel:#1a2129; --line:#2b3540; --fg:#dbe4ec; --dim:#8294a5;
          --acc:#4da3ff; --ok:#37c871; --warn:#ffb347; --bad:#ff5252; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:14px/1.45 system-ui,-apple-system,"Segoe UI",sans-serif; display:flex; height:100vh; overflow:hidden; }
  #map { flex:1; position:relative; cursor:grab; }
  #map.dragging { cursor:grabbing; }
  canvas { position:absolute; inset:0; }
  #side { width:380px; min-width:380px; background:var(--panel); border-left:1px solid var(--line);
          overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:12px; }
  h3 { margin:0 0 6px; font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--dim); }
  .card { background:#141a21; border:1px solid var(--line); border-radius:10px; padding:10px; }
  button { background:#243140; color:var(--fg); border:1px solid var(--line); border-radius:8px;
           padding:6px 10px; cursor:pointer; font-size:13px; }
  button:hover { background:#2d3d50; }
  button.acc { background:var(--acc); border-color:var(--acc); color:#08263f; font-weight:600; }
  button.danger { background:var(--bad); border-color:var(--bad); color:#fff; font-weight:700; }
  button.small { padding:2px 8px; font-size:12px; }
  input[type=text], select { background:#0e1318; color:var(--fg); border:1px solid var(--line);
           border-radius:8px; padding:6px 8px; width:100%; }
  #preview img { width:100%; border-radius:8px; display:block; background:#000; min-height:120px; }
  .row { display:flex; gap:6px; align-items:center; }
  .row.wrap { flex-wrap:wrap; }
  .spacer { flex:1; }
  #wplist { display:flex; flex-direction:column; gap:4px; }
  .wp { display:flex; gap:6px; align-items:center; background:#0e1318; border:1px solid var(--line);
        border-radius:8px; padding:4px 8px; font-size:13px; }
  .wp b { color:var(--acc); min-width:22px; }
  .muted { color:var(--dim); font-size:12px; }
  #routes .wp { cursor:default; }
  #livebox img { width:100%; border-radius:8px; background:#000; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px; }
  #stopbtn { width:100%; padding:12px; font-size:16px; }
  #toast { position:fixed; left:14px; bottom:14px; background:#000c; color:#fff; padding:8px 14px;
           border-radius:8px; opacity:0; transition:opacity .25s; pointer-events:none; max-width:50vw; }
  #legend { position:absolute; left:10px; top:10px; background:#000a; border-radius:8px;
            padding:8px 10px; font-size:12px; color:var(--dim); pointer-events:none; }
  #legend i { font-style:normal; }
</style>
</head>
<body>
<div id="map">
  <canvas id="cv"></canvas>
  <div id="legend">
    <div><i style="color:#56708a">●</i> node graph &nbsp; <i style="color:#ffd24d">●</i> waypoint
         &nbsp; <i style="color:#4da3ff">━</i> đường gợi ý &nbsp; <i style="color:#37c871">▲</i> subgoal (mũi tên = hướng xe nhìn)</div>
    <div><i style="color:#ff5252">●</i> xe (live) &nbsp;|&nbsp; kéo = pan, lăn = zoom, rê chuột = xem hướng, click = chọn node, <b>dbl-click = thêm waypoint</b></div>
    <div><label style="pointer-events:auto;cursor:pointer"><input type="checkbox" id="hdcolor" checked onchange="draw()"> màu node = hướng đi</label>
         &nbsp;<i style="color:hsl(0,65%,55%)">→</i> <i style="color:hsl(90,65%,55%)">↑</i> <i style="color:hsl(180,65%,55%)">←</i> <i style="color:hsl(270,65%,55%)">↓</i></div>
  </div>
</div>

<div id="side">
  <button id="stopbtn" class="danger" onclick="emergencyStop()">⛔ STOP XE NGAY</button>

  <div class="card" id="livebox">
    <h3>Live</h3>
    <div class="row"><span id="livedot" class="dot" style="background:var(--dim)"></span><span id="livetxt" class="muted">offline</span></div>
    <div id="livestat" class="muted" style="margin:4px 0"></div>
    <img id="liveimg" alt="" style="display:none">
  </div>

  <div class="card" id="preview" style="display:none">
    <h3>Node <span id="selid"></span></h3>
    <img id="selimg" alt="node frame">
    <div class="row" style="margin-top:6px">
      <button class="small" onclick="stepSel(-10)">≪10</button>
      <button class="small" onclick="stepSel(-1)">‹1</button>
      <span class="muted" id="selinfo" style="flex:1;text-align:center"></span>
      <button class="small" onclick="stepSel(1)">1›</button>
      <button class="small" onclick="stepSel(10)">10≫</button>
    </div>
    <div class="row" style="margin-top:6px">
      <span class="muted">hướng đi:</span> <b id="selhd" style="color:var(--warn)"></b>
      <span class="spacer"></span><span class="muted">node gần đây theo hướng:</span>
    </div>
    <div class="row wrap" id="dirchips" style="margin-top:4px"></div>
    <div class="row" style="margin-top:6px">
      <button class="acc" style="flex:1" onclick="addWp()">➕ Thêm waypoint</button>
      <button onclick="hideSel()">Đóng</button>
    </div>
  </div>

  <div class="card">
    <h3>Route đang vẽ</h3>
    <div id="wplist"></div>
    <div class="muted" id="sugginfo" style="margin:6px 0"></div>
    <div class="row wrap" style="margin-top:6px">
      <label class="muted">mode:</label>
      <select id="mode" style="width:auto" onchange="refreshSuggest()">
        <option value="graph">graph — Dijkstra giữa waypoint (an toàn)</option>
        <option value="direct">direct — đi thẳng từng waypoint</option>
      </select>
    </div>
    <div class="row" style="margin-top:6px">
      <input type="text" id="rname" placeholder="tên route (vd: park_vong_ho)">
      <button class="acc" onclick="saveRoute()">💾 Lưu</button>
      <button onclick="clearWps()">Xoá hết</button>
    </div>
  </div>

  <div class="card">
    <h3>Route đã lưu</h3>
    <div id="routes" class="muted">đang tải…</div>
  </div>
</div>
<div id="toast"></div>

<script>
"use strict";
// ---------- state ----------
let N=0, XY=null, SUID=null, HD=null, EXT=[0,1,0,1];
let cam={x:0,y:0,scale:5};                 // world(m) -> screen: s=(p-c)*scale (+flip y)
let sel=null, hov=null, wps=[], suggest=null, live=null, trail=[];
let activeRoute=null;
// node theo bucket hướng (24 × 15°) để tô màu nhanh
const NHUE=24, BSTYLE=[...Array(NHUE)].map((_,b)=>`hsl(${b*360/NHUE},65%,55%)`);
let BIDX=null;
function buildBuckets(){BIDX=Array.from({length:NHUE},()=>[]);if(!HD)return;
  for(let k=0;k<N;k++){let b=Math.round(HD[k]*NHUE/(2*Math.PI))%NHUE;if(b<0)b+=NHUE;BIDX[b].push(k);}}
const DIRG=['→','↗','↑','↖','←','↙','↓','↘'];   // heading 0 = Đông (+x), CCW
function dirBucket8(t){let b=Math.round(t*4/Math.PI)%8;if(b<0)b+=8;return b;}
function fmtHd(t){const deg=((90-t*180/Math.PI)%360+360)%360;   // la bàn: 0°=Bắc, thuận kim đồng hồ
  return DIRG[dirBucket8(t)]+' '+deg.toFixed(0)+'°';}
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const mapEl=document.getElementById('map');

function toast(m,ms=2500){const t=document.getElementById('toast');t.textContent=m;t.style.opacity=1;clearTimeout(t._h);t._h=setTimeout(()=>t.style.opacity=0,ms);}
async function jget(u){const r=await fetch(u);const j=await r.json();if(!r.ok)throw new Error(j.error||r.status);return j;}
async function jpost(u,b){const r=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})});const j=await r.json();if(!r.ok)throw new Error(j.error||r.status);return j;}

// ---------- canvas ----------
function resize(){const r=mapEl.getBoundingClientRect(),d=devicePixelRatio||1;
  cv.width=r.width*d; cv.height=r.height*d; cv.style.width=r.width+'px'; cv.style.height=r.height+'px';
  ctx.setTransform(d,0,0,d,0,0); draw();}
addEventListener('resize',resize);
function W2S(x,y){const r=mapEl.getBoundingClientRect();
  return [(x-cam.x)*cam.scale + r.width/2, r.height/2 - (y-cam.y)*cam.scale];}
function S2W(px,py){const r=mapEl.getBoundingClientRect();
  return [(px-r.width/2)/cam.scale+cam.x, cam.y-(py-r.height/2)/cam.scale];}

// mũi tên hướng th (toạ độ math, y lên trên) tại điểm màn hình (sx,sy)
function arrow(sx,sy,th,len,color,width){
  const c=Math.cos(th),s=-Math.sin(th),hx=sx+c*len,hy=sy+s*len;
  ctx.strokeStyle=color;ctx.lineWidth=width;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(hx,hy);ctx.stroke();
  ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(hx+c*7,hy+s*7);
  ctx.lineTo(hx-s*3.5,hy+c*3.5);ctx.lineTo(hx+s*3.5,hy-c*3.5);ctx.closePath();ctx.fill();}
// tam giác chỉ hướng (cho subgoal)
function triNode(sx,sy,th,rr,color){
  const c=Math.cos(th),s=-Math.sin(th);
  ctx.fillStyle=color;ctx.beginPath();
  ctx.moveTo(sx+c*rr*1.8,sy+s*rr*1.8);
  ctx.lineTo(sx-c*rr-s*rr*0.95,sy-s*rr+c*rr*0.95);
  ctx.lineTo(sx-c*rr+s*rr*0.95,sy-s*rr-c*rr*0.95);
  ctx.closePath();ctx.fill();}

function draw(){
  const r=mapEl.getBoundingClientRect(); ctx.clearRect(0,0,r.width,r.height);
  if(!XY) return;
  // session polylines (suid contiguous ranges)
  ctx.lineWidth=1; ctx.strokeStyle='#2e3c49';
  let i=0;
  while(i<N){let j=i; ctx.beginPath(); const [x0,y0]=W2S(XY[2*i],XY[2*i+1]); ctx.moveTo(x0,y0);
    while(j+1<N && SUID[j+1]===SUID[i]){j++; const[xx,yy]=W2S(XY[2*j],XY[2*j+1]); ctx.lineTo(xx,yy);}
    ctx.stroke(); i=j+1;}
  // nodes — màu theo hướng đi (bucket 15°) để thấy "làn" 2 chiều tách nhau
  const rad=Math.max(1.2,Math.min(4,cam.scale*0.18));
  const colorHd=HD&&BIDX&&document.getElementById('hdcolor').checked;
  if(colorHd){
    for(let b=0;b<NHUE;b++){const arr=BIDX[b];if(!arr.length)continue;
      ctx.fillStyle=BSTYLE[b];
      for(const k of arr){const[sx,sy]=W2S(XY[2*k],XY[2*k+1]);
        if(sx<-5||sy<-5||sx>r.width+5||sy>r.height+5)continue; ctx.fillRect(sx-rad/2,sy-rad/2,rad,rad);}}
  }else{
    ctx.fillStyle='#56708a';
    for(let k=0;k<N;k++){const[sx,sy]=W2S(XY[2*k],XY[2*k+1]);
      if(sx<-5||sy<-5||sx>r.width+5||sy>r.height+5)continue; ctx.fillRect(sx-rad/2,sy-rad/2,rad,rad);}
  }
  // suggested path
  if(suggest&&suggest.path&&suggest.path.length>1){
    ctx.lineWidth=3; ctx.strokeStyle='#4da3ff'; ctx.beginPath();
    suggest.path.forEach((n,k)=>{const[sx,sy]=W2S(XY[2*n],XY[2*n+1]); k?ctx.lineTo(sx,sy):ctx.moveTo(sx,sy);});
    ctx.stroke();
    (suggest.subgoals||[]).forEach(n=>{const[sx,sy]=W2S(XY[2*n],XY[2*n+1]);
      triNode(sx,sy,HD?HD[n]:0,5,'#37c871');});
  }
  // direct-mode: nối thẳng waypoint
  if(document.getElementById('mode').value==='direct'&&wps.length>1){
    ctx.lineWidth=2; ctx.setLineDash([6,5]); ctx.strokeStyle='#4da3ff'; ctx.beginPath();
    wps.forEach((n,k)=>{const[sx,sy]=W2S(XY[2*n],XY[2*n+1]); k?ctx.lineTo(sx,sy):ctx.moveTo(sx,sy);});
    ctx.stroke(); ctx.setLineDash([]);
  }
  // waypoints (mũi tên = hướng node đã chọn)
  wps.forEach((n,k)=>{const[sx,sy]=W2S(XY[2*n],XY[2*n+1]);
    if(HD)arrow(sx,sy,HD[n],17,'#ffd24d',2.5);
    ctx.fillStyle='#ffd24d'; ctx.beginPath(); ctx.arc(sx,sy,8,0,7); ctx.fill();
    ctx.fillStyle='#1a1a1a'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(k+1,sx,sy);});
  // selected + hover
  if(sel!=null){const[sx,sy]=W2S(XY[2*sel],XY[2*sel+1]);
    if(HD)arrow(sx,sy,HD[sel],20,'#fff',2);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(sx,sy,9,0,7); ctx.stroke();}
  if(hov!=null&&hov!==sel){const[sx,sy]=W2S(XY[2*hov],XY[2*hov+1]);
    if(HD)arrow(sx,sy,HD[hov],16,'#9fc4e8',1.5);
    ctx.strokeStyle='#9fc4e8'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(sx,sy,7,0,7); ctx.stroke();}
  // live trail + car
  if(trail.length>1){ctx.lineWidth=2;ctx.strokeStyle='#ff525288';ctx.beginPath();
    trail.forEach((p,k)=>{const[sx,sy]=W2S(p[0],p[1]);k?ctx.lineTo(sx,sy):ctx.moveTo(sx,sy);});ctx.stroke();}
  if(live&&live.online&&live.xy){
    const[sx,sy]=W2S(live.xy[0],live.xy[1]);
    ctx.fillStyle='#ff5252'; ctx.beginPath(); ctx.arc(sx,sy,7,0,7); ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    if(live.target!=null&&XY){const[tx,ty]=W2S(XY[2*live.target],XY[2*live.target+1]);
      ctx.strokeStyle='#ff9d4d'; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(tx,ty); ctx.stroke(); ctx.setLineDash([]);}
  }
}

// pan / zoom / pick
let drag=null;
mapEl.addEventListener('mousedown',e=>{drag={x:e.clientX,y:e.clientY,cx:cam.x,cy:cam.y,moved:false};mapEl.classList.add('dragging');});
addEventListener('mousemove',e=>{if(!drag)return;const dx=e.clientX-drag.x,dy=e.clientY-drag.y;
  if(Math.abs(dx)+Math.abs(dy)>3)drag.moved=true;
  cam.x=drag.cx-dx/cam.scale; cam.y=drag.cy+dy/cam.scale; draw();});
addEventListener('mouseup',e=>{if(drag&&!drag.moved)pick(e,false);drag=null;mapEl.classList.remove('dragging');});
mapEl.addEventListener('dblclick',e=>{pick(e,true);});
mapEl.addEventListener('wheel',e=>{e.preventDefault();
  const k=e.deltaY<0?1.18:1/1.18, r=mapEl.getBoundingClientRect();
  const [wx,wy]=S2W(e.clientX-r.left,e.clientY-r.top);
  cam.scale=Math.min(80,Math.max(1.2,cam.scale*k));
  const [nx,ny]=S2W(e.clientX-r.left,e.clientY-r.top);
  cam.x+=wx-nx; cam.y+=wy-ny; draw();},{passive:false});

function nearestNode(px,py){const r=mapEl.getBoundingClientRect();let best=-1,bd=22*22;
  for(let k=0;k<N;k++){const[sx,sy]=W2S(XY[2*k],XY[2*k+1]);
    if(sx<-5||sy<-5||sx>r.width+5||sy>r.height+5)continue;
    const d=(sx-px)**2+(sy-py)**2; if(d<bd){bd=d;best=k;}}
  return best;}
function pick(e,addAlso){const r=mapEl.getBoundingClientRect();
  const n=nearestNode(e.clientX-r.left,e.clientY-r.top);
  if(n<0)return; selectNode(n); if(addAlso)addWp();}
// hover: ring + mũi tên hướng trên node gần con trỏ
mapEl.addEventListener('mousemove',e=>{if(drag)return;
  const r=mapEl.getBoundingClientRect();
  const n=nearestNode(e.clientX-r.left,e.clientY-r.top);
  const h=n<0?null:n;
  if(h!==hov){hov=h;mapEl.style.cursor=hov!=null?'pointer':'';draw();}});

// ---------- node preview ----------
function selectNode(n){sel=n;
  document.getElementById('preview').style.display='block';
  document.getElementById('selid').textContent='#'+n;
  document.getElementById('selinfo').textContent=`(${XY[2*n].toFixed(1)}, ${XY[2*n+1].toFixed(1)}) m`;
  document.getElementById('selimg').src=`/api/node_image/${n}?t=${n}`;
  if(HD){document.getElementById('selhd').textContent=fmtHd(HD[n]);renderDirChips(n);}
  draw();}
// các node trong vòng 6 m quanh n, gom theo 8 hướng -> chip bấm để đổi sang
// node gần nhất đi hướng đó (chọn đúng chiều mình muốn xe chạy)
function renderDirChips(n){
  const el=document.getElementById('dirchips'); el.innerHTML='';
  const R2=6*6, bx=XY[2*n], by=XY[2*n+1];
  const best=new Array(8).fill(null), cnt=new Array(8).fill(0);
  for(let k=0;k<N;k++){
    const dx=XY[2*k]-bx, dy=XY[2*k+1]-by, d2=dx*dx+dy*dy;
    if(d2>R2)continue;
    const b=dirBucket8(HD[k]); cnt[b]++;
    if(!best[b]||d2<best[b].d2)best[b]={n:k,d2};
  }
  const myb=dirBucket8(HD[n]);
  for(let b=0;b<8;b++){
    if(!cnt[b])continue;
    const btn=document.createElement('button');
    btn.className='small'+(b===myb?' acc':'');
    btn.textContent=`${DIRG[b]} ${cnt[b]}`;
    btn.title='chuyển sang node gần nhất đi hướng '+DIRG[b];
    btn.onclick=()=>selectNode(best[b].n);
    el.appendChild(btn);
  }
}
function stepSel(d){if(sel==null)return;let n=sel+d;
  n=Math.max(0,Math.min(N-1,n));
  // ở lại trong cùng session để duyệt ảnh liền mạch
  while(n!==sel&&SUID[n]!==SUID[sel])n+=(d>0?-1:1);
  selectNode(n);}
function hideSel(){sel=null;document.getElementById('preview').style.display='none';draw();}

// ---------- waypoints + suggestion ----------
function addWp(){if(sel==null)return;wps.push(sel);renderWps();refreshSuggest();}
function delWp(i){wps.splice(i,1);renderWps();refreshSuggest();}
function moveWp(i,d){const j=i+d;if(j<0||j>=wps.length)return;[wps[i],wps[j]]=[wps[j],wps[i]];renderWps();refreshSuggest();}
function clearWps(){wps=[];suggest=null;renderWps();draw();document.getElementById('sugginfo').textContent='';}
function renderWps(){const el=document.getElementById('wplist');
  el.innerHTML=wps.length?'':'<span class="muted">double-click trên map (hoặc chọn node → ➕) để thêm waypoint. Waypoint cuối = GOAL.</span>';
  wps.forEach((n,i)=>{const div=document.createElement('div');div.className='wp';
    const hd=HD?` <span style="color:var(--warn)" title="hướng đi">${DIRG[dirBucket8(HD[n])]}</span>`:'';
    div.innerHTML=`<b>${i+1}</b> node ${n}${hd} <span class="spacer"></span>
      <button class="small" onclick="selectNode(${n})">ảnh</button>
      <button class="small" onclick="moveWp(${i},-1)">↑</button>
      <button class="small" onclick="moveWp(${i},1)">↓</button>
      <button class="small" onclick="delWp(${i})">✕</button>`;
    el.appendChild(div);});
  draw();}
async function refreshSuggest(){
  suggest=null;
  const info=document.getElementById('sugginfo');
  if(document.getElementById('mode').value==='direct'){info.textContent=wps.length>1?'mode direct: xe visual-servo thẳng theo thứ tự waypoint (đường nét đứt).':'';draw();return;}
  if(wps.length<2){info.textContent=wps.length===1?'thêm waypoint nữa (hoặc Run: xe tự Dijkstra từ vị trí hiện tại tới goal).':'';draw();return;}
  try{suggest=await jget('/api/suggest?wps='+wps.join(','));
    info.textContent=`gợi ý: ${suggest.path.length} node, ${suggest.length_m} m, ${suggest.subgoals.length} subgoal`;
  }catch(e){info.textContent='⚠ '+e.message;}
  draw();}

// ---------- save / list / activate ----------
async function saveRoute(){
  const name=document.getElementById('rname').value.trim();
  if(!name)return toast('đặt tên route đã');
  if(!wps.length)return toast('route rỗng');
  try{await jpost('/api/routes',{name,waypoints:wps,mode:document.getElementById('mode').value});
    toast('đã lưu '+name);loadRoutes();}catch(e){toast('lỗi: '+e.message);}}
async function loadRoutes(){const el=document.getElementById('routes');
  try{const rs=await jget('/api/routes');
    el.innerHTML=rs.length?'':'<span class="muted">chưa có route nào</span>';
    rs.forEach(r=>{const div=document.createElement('div');div.className='wp';
      const act=(activeRoute===r.name)?' <span style="color:var(--ok)">●running</span>':'';
      div.innerHTML=`<b>${r.mode==='direct'?'D':'G'}</b> ${r.name}${act}
        <span class="muted">(${r.waypoints.length} wp)</span><span class="spacer"></span>
        <button class="small" onclick='editRoute(${JSON.stringify(r)})'>sửa</button>
        <button class="small acc" onclick="runRoute('${r.name}')">▶ Run</button>
        <button class="small" onclick="delRoute('${r.name}')">✕</button>`;
      el.appendChild(div);});
  }catch(e){el.textContent='lỗi: '+e.message;}}
function editRoute(r){wps=r.waypoints.slice();document.getElementById('mode').value=r.mode||'graph';
  document.getElementById('rname').value=r.name;renderWps();refreshSuggest();}
async function delRoute(n){try{await fetch('/api/routes/'+n,{method:'DELETE'});loadRoutes();}catch(e){toast(e.message);}}
async function runRoute(n){try{await jpost('/api/activate',{name:n});activeRoute=n;
  toast('▶ đã giao route "'+n+'" cho xe');loadRoutes();}catch(e){toast('lỗi: '+e.message);}}
async function emergencyStop(){try{await jpost('/api/stop');activeRoute=null;
  toast('⛔ STOP đã gửi');loadRoutes();}catch(e){toast(e.message);}}

// ---------- live ----------
async function pollLive(){
  try{live=await jget('/api/live');}catch(e){live={online:false};}
  const dot=document.getElementById('livedot'),txt=document.getElementById('livetxt'),
        st=document.getElementById('livestat'),img=document.getElementById('liveimg');
  if(live.online){
    dot.style.background='var(--ok)';
    txt.textContent=live.state||'online';
    let s=`node ${live.cur??'?'} | wp ${live.wp_idx!=null?(live.wp_idx+1)+'/'+live.wp_total:'-'}`;
    if(live.gps_dist!=null)s+=` | còn ${live.gps_dist.toFixed(1)} m`;
    if(live.steer!=null)s+=` | lái ${live.steer.toFixed(2)} ga ${live.throt.toFixed(2)}`;
    st.textContent=s;
    if(live.route&&live.route!==activeRoute){activeRoute=live.route;loadRoutes();}
    img.style.display='block'; img.src='/api/live_frame?ts='+Date.now();
    if(live.xy){trail.push(live.xy); if(trail.length>200)trail.shift();}
  }else{dot.style.background='var(--dim)';txt.textContent='offline (inference_loop --web chưa chạy)';
    st.textContent='';img.style.display='none';}
  draw();}

// ---------- init ----------
(async function(){
  try{const g=await jget('/api/graph');
    N=g.n; XY=new Float64Array(g.xy.flat()); SUID=new Int32Array(g.suid); EXT=g.extent;
    HD=g.heading?new Float32Array(g.heading):null; buildBuckets();
    cam.x=(EXT[0]+EXT[1])/2; cam.y=(EXT[2]+EXT[3])/2;
    const r=mapEl.getBoundingClientRect();
    cam.scale=Math.min(r.width/(EXT[1]-EXT[0]+20),r.height/(EXT[3]-EXT[2]+20));
    resize(); renderWps(); loadRoutes();
    setInterval(pollLive,800);
  }catch(e){toast('không tải được graph: '+e.message,8000);}
})();
</script>
